<!doctype html>
<!--
  Source for the Google Play feature graphic (1024×500). Regenerate with:
    chromium --headless=new --disable-gpu --force-device-scale-factor=1 \
      --window-size=1024,500 --hide-scrollbars \
      --screenshot=store-assets/feature-graphic-1024x500.png \
      "file://$PWD/store-assets/feature-graphic.html"
  Font paths are relative to this file (../public/fonts), so it must stay in store-assets/.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @font-face {
    font-family: "Fredoka"; font-weight: 600; font-display: block;
    src: url("../public/fonts/Fredoka-600.woff2") format("woff2");
  }
  @font-face {
    font-family: "Nunito"; font-weight: 400 800; font-display: block;
    src: url("../public/fonts/Nunito-var.woff2") format("woff2");
  }
  @font-face {
    font-family: "KaoJP"; font-display: block;
    src: url("../public/fonts/NotoSansJP-glyphs.woff2") format("woff2");
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; }
  body {
    width: 1024px; height: 500px; overflow: hidden;
    background: linear-gradient(135deg, #fff8ec 0%, #f9eedd 100%);
    border-left: 16px solid #a85d1c;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 72px;
    font-family: "Nunito", system-ui, sans-serif;
    color: #4a4036;
  }
  .faces {
    font-family: "KaoJP", "Nunito", sans-serif;
    font-size: 62px; color: #4a4036; line-height: 1.3;
    letter-spacing: 2px; margin-bottom: 28px; white-space: nowrap;
  }
  .wordmark {
    font-family: "Fredoka", "Nunito", sans-serif; font-weight: 600;
    font-size: 96px; color: #4a4036; line-height: 1; letter-spacing: -1px;
  }
  .wordmark .jp { color: #a85d1c; font-size: 60px; margin-left: 14px; font-family: "KaoJP", sans-serif; }
  .tagline { font-size: 30px; color: #736655; font-weight: 600; margin-top: 16px; white-space: nowrap; }
  .url { position: absolute; right: 56px; bottom: 40px; font-size: 26px; color: #a85d1c; font-weight: 700; }
</style>
</head>
<body>
  <div class="faces">＼(＾▽＾)／&nbsp;&nbsp;&nbsp;(=^･ω･^=)&nbsp;&nbsp;&nbsp;ʕ•ᴥ•ʔ&nbsp;&nbsp;&nbsp;(｡♥‿♥｡)</div>
  <div class="wordmark">Kaomoji<span class="jp">顔文字</span></div>
  <div class="tagline">Copy &amp; paste 800+ Japanese emoticons — offline &amp; private.</div>
  <div class="url">kaomoji.fyi</div>
</body>
</html>
